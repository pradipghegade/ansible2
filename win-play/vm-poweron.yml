- name: Power on VM using AWX credential 'vmware login'
  hosts: localhost
  gather_facts: no
  tasks:
    - name: Power on VM
      community.vmware.vmware_guest_powerstate:
        hostname: "{{ host }}"
        username: "{{ username }}"
        password: "{{ password }}"
        validate_certs: false
        name: vm1
        state: powered-on
      delegate_to: localhost
