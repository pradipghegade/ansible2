- name: Power on VM using AWX credential 'vmware login'
  hosts: all
  gather_facts: no
  tasks:
    - name: Power on VM
      community.vmware.vmware_guest_powerstate:
        hostname: "{{ ansible_host }}"
        username: "{{ ansible_user }}"
        password: "{{ ansible_password }}"
        validate_certs: false
        name: vm1
        state: powered-on
