- name: Power on VM using AWX credential 'vmware login'
  hosts: localhost
  gather_facts: no
  tasks:
    - name: Power on VM
      community.vmware.vmware_guest_powerstate:
        hostname: "{{ vmware_login_hostname }}"
        username: "{{ vmware_login_username }}"
        password: "{{ vmware_login_password }}"
        validate_certs: false
        name: vm1
        state: powered-on
