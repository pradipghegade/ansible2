---
  - name: Run powershell script to copy setup
    hosts: all
#    become: true
    gather_facts: false
    tasks:
      - name: script to copy msi file
        ansible.windows.win_powershell:
          script: |
            echo "Hello from PowerShell!" | out-file c:\temp\ps.txt -append
            Copy-Item '\\pune-dc\c$\temp\powershell.msi' c:\temp\powershell.msi -force
            Copy-Item '\\pune-dc\c$\temp\foo.txt' c:\temp\newfile.txt -Force -Recurse
            get-date | out-file c:\temp\ps.txt -append
