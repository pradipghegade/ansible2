---
- name: Collect Windows OS details and send via AWX notification
  hosts: all
  gather_facts: no
  tasks:
    - name: Gather OS details
      win_command: systeminfo
      register: os_info

    - name: Format OS details
      set_fact:
        os_summary: |
          ==== Windows Server OS Details ====
          {{ os_info.stdout }}

    - name: Show OS details (captured by AWX job output)
      debug:
        msg: "{{ os_summary }}"
        
    - name: Push OS details into AWX stats
      ansible.builtin.set_stats:
        data:
          windows_os_details: "{{ os_info.stdout }}"
