---
- name: Power on VMware VM dynamically
  hosts: localhost
  gather_facts: no
  tasks:
    - name: Gather VM info
      community.vmware.vmware_vm_info:
        hostname: "{{ vcenter_hostname }}"
        username: "{{ vcenter_username }}"
        password: "{{ vcenter_password }}"
        validate_certs: no
      register: vm_info

    - name: Debug VM list
      debug:
        var: vm_info.virtual_machines

    - name: Power on VM by name
      community.vmware.vmware_guest_powerstate:
        hostname: "{{ vcenter_hostname }}"
        username: "{{ vcenter_username }}"
        password: "{{ vcenter_password }}"
        validate_certs: no
        name: VM1
        state: powered-on
      delegate_to: localhost
      when: target_vm in (vm_info.virtual_machines | map(attribute='name') | list)
